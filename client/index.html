<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Who Goes First? - First Player Picker</title>
    <meta name="description" content="A magic mirror style web app that uses AI face detection to pick who goes first. No data leaves your device." />
    <meta property="og:title" content="Who Goes First? - AI First Player Picker" />
    <meta property="og:description" content="Use face detection to randomly choose who starts the game. Fast, private, and fun!" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    <style>
      #splash {
        position: fixed;
        inset: 0;
        background: linear-gradient(to bottom right, #0a0a1a, #0f0f2e, #0a0a1a);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        font-family: 'Outfit', sans-serif;
        z-index: 9999;
        transition: opacity 0.3s ease-out;
      }
      #splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #splash h1 {
        color: white;
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: -0.025em;
        margin: 0;
      }
      #splash .loader {
        width: 2.5rem;
        height: 2.5rem;
        border: 3px solid rgba(255,255,255,0.1);
        border-top-color: #fbbf24;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <h1>Who Goes First?</h1>
      <div class="loader"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      function removeSplash() {
        var s = document.getElementById('splash');
        if (s) {
          s.classList.add('fade-out');
          setTimeout(function() { s.remove(); }, 300);
        }
      }
      window.addEventListener('app-ready', removeSplash);
      setTimeout(removeSplash, 8000);
    </script>
  </body>
</html>
